{% extends 'base.html' %}
{% block title %}My Profile - SafeGig{% endblock %}

{% block content %}
<div class="form-container" style="max-width: 600px; margin-top: 2rem;">
    <h2 style="margin-bottom: 1.5rem;">Student Profile</h2>
    <form method="POST" enctype="multipart/form-data">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="form-group">
            <label for="education">Education</label>
            <input type="text" id="education" name="education" class="form-control" value="{{ profile['education'] if profile else '' }}" placeholder="University, Major, Expected Graduation Year" required>
        </div>
        <div class="form-group">
            <label for="skills">Key Skills</label>
            <textarea id="skills" name="skills" class="form-control" rows="4" placeholder="Python, Data Analysis, Writing, Communication..." required>{{ profile['skills'] if profile else '' }}</textarea>
        </div>
        <div class="form-group">
            <label for="resume">Upload Resume (PDF/DOC)</label>
            <input type="file" id="resume" name="resume" class="form-control" accept=".pdf,.doc,.docx" {% if not profile or not profile['resume_path'] %}required{% endif %}>
            {% if profile and profile['resume_path'] %}
                <div style="margin-top: 0.5rem; display: flex; align-items: center; gap: 0.5rem;">
                    <small style="color: var(--success);">✓ Current resume:</small>
                    <a href="{{ url_for('public.download_resume', filename=profile['resume_path']) }}" target="_blank" style="font-size: 0.875rem; color: var(--primary-color);">View {{ profile['resume_path'] }}</a>
                </div>
            {% endif %}
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Save Profile</button>
    </form>
</div>
{% endblock %}
