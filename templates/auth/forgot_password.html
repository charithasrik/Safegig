{% extends 'base.html' %}
{% block title %}Forgot Password - SafeGig{% endblock %}

{% block content %}
<div class="form-container" style="margin-top: 4rem;">
    <h2 style="margin-bottom: 1.5rem; text-align: center;">Forgot Your Password?</h2>
    <p style="text-align: center; margin-bottom: 2rem;">Enter your email address below and we'll send you a secure link to reset your password.</p>
    <form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" class="form-control" required placeholder="Ex: example@student.college.edu">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Send Reset Link</button>
    </form>
    <br>
    <p style="text-align: center;">
        <a href="{{ url_for('public.index') }}">Return Home</a>
    </p>
</div>
{% endblock %}
