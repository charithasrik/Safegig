{% extends 'base.html' %}
{% block title %}Reset Password - SafeGig{% endblock %}

{% block content %}
<div class="form-container" style="margin-top: 4rem;">
    <h2 style="margin-bottom: 1.5rem; text-align: center;">Reset Password</h2>
    <p style="text-align: center; margin-bottom: 2rem;">Please enter your new password below.</p>

    <form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="form-group">
            <label for="password">New Password</label>
            <input type="password" id="password" name="password" class="form-control" required minlength="8" placeholder="At least 8 characters">
            <div class="password-strength-container">
                <div id="password-strength-bar" class="password-strength-bar"></div>
            </div>
            <div id="password-strength-text" class="password-strength-text"></div>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Save New Password</button>
    </form>
</div>

<script>
    const passwordInput = document.getElementById('password');
    const strengthBar = document.getElementById('password-strength-bar');
    const strengthText = document.getElementById('password-strength-text');

    passwordInput.addEventListener('input', function() {
        const password = this.value;
        let strength = 0;
        
        if (password.length > 0) {
            if (password.length >= 8) strength += 1;
            if (password.match(/[a-z]+/)) strength += 1;
            if (password.match(/[A-Z]+/)) strength += 1;
            if (password.match(/[0-9]+/)) strength += 1;
            if (password.match(/[^a-zA-Z0-9]+/)) strength += 1;
        }

        let width = '0%';
        let color = 'var(--border-color)';
        let text = '';

        if (password.length === 0) {
            strengthBar.style.width = '0%';
            strengthText.textContent = '';
            return;
        }

        switch (strength) {
            case 0:
            case 1:
            case 2:
                width = '33%';
                color = 'var(--danger)';
                text = 'Weak';
                break;
            case 3:
            case 4:
                width = '66%';
                color = 'var(--warning)';
                text = 'Medium';
                break;
            case 5:
                width = '100%';
                color = 'var(--success)';
                text = 'Strong';
                break;
        }

        strengthBar.style.width = width;
        strengthBar.style.backgroundColor = color;
        strengthText.textContent = text;
        strengthText.style.color = color;
    });
</script>
{% endblock %}
