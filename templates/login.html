{% extends 'base.html' %}
{% block title %}Login - SafeGig{% endblock %}

{% block content %}
<div class="form-container" style="margin-top: 4rem;">
    <h2 style="margin-bottom: 1.5rem; text-align: center;">Welcome Back</h2>
    <form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
    </form>
    <p style="text-align: center; margin-top: 1.5rem;">
        <a href="{{ url_for('auth.forgot_password') }}">Forgot Password?</a><br><br>
        Don't have an account? <a href="{{ url_for('auth.register') }}">Register here</a>
    </p>
</div>
{% endblock %}
